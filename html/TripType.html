<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Choose Trip Type</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            margin: 0;
            padding: 0;
        }
        .container {
            max-width: 400px;
            margin: 50px auto;
            background: #fff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        h2 {
            text-align: center;
            color: #333;
        }
        label {
            display: block;
            margin-top: 15px;
            color: #555;
        }
        select {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        button {
            width: 100%;
            padding: 10px;
            margin-top: 20px;
            background: #007bff;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            background: #0056b3;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Choose Your Trip Type</h2>
        <form id="tripTypeForm">
            <label for="tripType">Trip Type:</label>
            <select id="tripType" name="tripType" required>
                <option value="">--Select--</option>
                <option value="oneway">One Way</option>
                <option value="twoway">Round Trip</option>
            </select>
            <button type="submit">Continue</button>
        </form>
    </div>
    <script>
        document.getElementById('tripTypeForm').addEventListener('submit', function(e) {
            e.preventDefault();
            var tripType = document.getElementById('tripType').value;
            if (!tripType) {
                alert('Please select a trip type.');
                return;
            }
            // Redirect to Booking.html with trip type as query parameter
            window.location.href = 'Booking.html?tripType=' + tripType;
        });
    </script>
</body>
</html>
