    <div class="container">
        <h2>Create Account</h2>
        <div class="subtitle">Join StayEasy and get exclusive deals!</div>
        
        <div id="messageBox"></div>
        
        <form action="sign up.php" method="POST">
            <label>Full Name</label>
            <input type="text" name="full_name" id="full_name" placeholder="Enter your full name" required>
           
            <label>Email Address</label>
            <input type="email"name="email" id="email" placeholder="your@email.com" required>
            
            <label>Phone Number</label>
            <input type="tel" name="phone" id="phone" placeholder="+1 234 567 8900" required>
            
            <label>Password</label>
            <input type="password" name="password" id="password" placeholder="Create a password" required>
            <div class="password-hint">Password must be at least 6 characters</div>
            
            <label>Confirm Password</label>
            <input type="password" name="confirm" id="confirm" placeholder="Confirm your password" required>
            
            <button type="submit">Sign Up</button>
        </form>
        
        <div class="login-link">
            Already have an account? <a href="Log in.html">Log In</a>
        </div>
    </div>
